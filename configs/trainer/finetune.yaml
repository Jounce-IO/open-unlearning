# trainer.args: any key in the dllm allow-list is supported (see dllm docs/configuration.md).
#
# Speed-related defaults align with dllm SFT (dllm.utils.configs.TrainingArguments + HF
# TrainingArguments defaults) so unlearn and dllm sft runs are comparable without copying
# trainer knobs. Override per experiment or configs/unlearn/... as needed.
handler: FinetuneTrainer
# Shared by all FinetuneTrainer-based trainers (GradAscent, GradDiff, …). Merges with per-method
# method_args in trainer/*.yaml (e.g. GradDiff gamma/alpha). Aligns four-way ROUGE scheduling with dllm SFT.
method_args:
  four_way_eval_steps: 50
  four_way_rouge_eval_steps: 500
  four_way_rouge_max_samples: 64
args:
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 1
  learning_rate: 1e-5
  lr_scheduler_type: cosine
  warmup_ratio: 0.1
  bf16: True
  bf16_full_eval: False
  logging_steps: 10
  output_dir: ${paths.output_dir}
  logging_dir: ${trainer.args.output_dir}/logs
  report_to: tensorboard
  ddp_find_unused_parameters: None
  gradient_checkpointing: False
  optim: adamw_torch_fused
  save_strategy: 'no'
  save_only_model: True
  weight_decay: 0.00
  do_train: True
  do_eval: True
  eval_on_start: True
  eval_strategy: epoch
  num_train_epochs: 10
  seed: 42
