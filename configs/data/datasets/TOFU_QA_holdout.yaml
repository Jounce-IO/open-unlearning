# TOFU holdout split for four-way validation (eval_dataset holdout key).
# Use in data.validation_splits.holdout with hf_args.name: ${holdout_split}.
TOFU_QA_holdout:
  handler: QADataset
  args:
    hf_args:
      name: "holdout10"
      split: "train"
      path: "locuslab/TOFU"
    question_key: "question"
    answer_key: "answer"
    max_length: 512
