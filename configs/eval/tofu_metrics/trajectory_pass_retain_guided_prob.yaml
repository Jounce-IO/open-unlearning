# @package eval.tofu_trajectory.metrics.trajectory_pass_retain_guided_prob
defaults:
  - ../../collator@collators: DataCollatorForSupervisedDatasetwithIndex

handler: trajectory_metrics
batch_size: 2
sort_by_length: true
trajectory_pass_id: retain__guided_prob
metrics:
  probability: {}
trajectory_config:
  evaluation_mode: guided_native
  logits_source: sampler
  return_logits: true
  return_fixation_steps: true
  trajectory_step_prefetch_max_steps: 16
  trajectory_logits_storage: dense_r
  trajectory_step_view_batch_chunk_max: 16
  include_views: [full, eos]
  use_generalized_sequence_probability: true
  logit_alignment: causal
  metric_worker_pool_size: 8
  sampler_kwargs:
    steps: 50
    temperature: 0.0
    max_new_tokens: 200
    trajectory_sample_interval: 8
  # Phase C: full JSONL for pre-commit vs ROUGE canvas hypothesis (see docs/trajectory-probability-investigation.md)
  probability_hypothesis_investigation: false
  probability_hypothesis_investigation_trajs: [steps, fixation_start]
  probability_hypothesis_investigation_views: [full, eos]
metric_display_names:
  - trajectory_retain_Q_A_Prob
datasets:
  TOFU_QA_retain_eval:
    access_key: retain
    handler: QADataset
    args:
      hf_args:
        name: retain_perturbed
        split: train
        path: locuslab/TOFU
      question_key: ${eval.tofu_trajectory.question_key}
      answer_key: answer
      max_length: 512
      predict_with_generate: true
collators:
  DataCollatorForSupervisedDataset:
    args:
      padding_side: left
generation_args:
  max_new_tokens: 200
