# @package eval.tofu_trajectory.metrics.trajectory_pass_wf_guided_native
# Single inference pass: world_facts split, guided_native.
defaults:
  - ../../collator@collators: DataCollatorForSupervisedDatasetwithIndex

handler: trajectory_metrics
batch_size: 2
sort_by_length: true
trajectory_pass_id: wf__guided_native
metrics:
  probability: {}
  extraction_strength: {}
  truth_ratio:
    aggregator: closer_to_1_better
    pre_compute:
      correct:
        handler: probability
        access_key: correct
        labels_field: labels_correct
      wrong:
        handler: probability
        access_key: wrong
        labels_field: labels_wrong
trajectory_config:
  evaluation_mode: guided_native
  logits_source: sampler
  return_logits: true
  return_fixation_steps: true
  trajectory_step_prefetch_max_steps: 16
  trajectory_logits_storage: dense_r
  trajectory_step_view_batch_chunk_max: 16
  include_views: [full, eos]
  use_generalized_sequence_probability: true
  logit_alignment: causal
  metric_worker_pool_size: 8
  sampler_kwargs:
    steps: 50
    temperature: 0.0
    max_new_tokens: 200
    trajectory_sample_interval: 8
metric_display_names:
  - trajectory_wf_Q_A_Prob_normalised
  - trajectory_wf_extraction_strength
  - trajectory_wf_Truth_Ratio
datasets:
  TOFU_QA_wf_eval:
    access_key: wf
    handler: QAwithDualAnswersDataset
    args:
      hf_args:
        name: world_facts_perturbed
        split: train
        path: locuslab/TOFU
      question_key: ${eval.tofu_trajectory.question_key}
      correct_answer_key: answer
      wrong_answer_key: perturbed_answer
      max_length: 512
      predict_with_generate: true
collators:
  DataCollatorForSupervisedDataset:
    args:
      padding_side: left
generation_args:
  max_new_tokens: 200
