# @package eval.tofu_trajectory.metrics.trajectory_pass_forget_unguided
# Single inference pass: forget split, guidance-free (OU forget ROUGE).
# QADataset on ``${forget_split}_perturbed`` + ``answer_key=answer`` (matches scalar ``forget_Q_A_ROUGE``).
# For SFT-parity forget ROUGE (non-perturbed split), use a dedicated parity config — not this default pass.
defaults:
  - ../../data/datasets@datasets: TOFU_QA_forget
  - ../../collator@collators: DataCollatorForSupervisedDatasetwithIndex

handler: trajectory_metrics
batch_size: 4
sort_by_length: true
trajectory_pass_id: forget__unguided
metrics:
  rouge:
    rouge_type: rougeL_recall
trajectory_config:
  evaluation_mode: unguided
  logits_source: sampler
  return_logits: true
  return_fixation_steps: true
  # Align terminal trajectory ROUGE with memorization ``forget_Q_A_ROUGE`` (``eval_text_similarity`` /
  # ``model.generate``): default ``logits_argmax`` scores a different string than generate.
  rouge_prediction_source: canvas_plus_step_x0
  include_views: [full, eos]
  use_generalized_sequence_probability: true
  logit_alignment: causal
  metric_worker_pool_size: 8
  sampler_kwargs:
    steps: 50
    temperature: 0.0
    max_new_tokens: 200
    trajectory_sample_interval: 8
metric_display_names:
  - trajectory_forget_Q_A_ROUGE
datasets:
  TOFU_QA_forget:
    access_key: forget
    handler: QADataset
    args:
      hf_args:
        name: ${eval.tofu_trajectory.forget_split}_perturbed
        split: train
        path: locuslab/TOFU
      question_key: ${eval.tofu_trajectory.question_key}
      answer_key: answer
      max_length: 512
      predict_with_generate: true
collators:
  DataCollatorForSupervisedDataset:
    args:
      padding_side: left
generation_args:
  max_new_tokens: 200
