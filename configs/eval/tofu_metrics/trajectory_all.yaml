# @package eval.tofu_trajectory.metrics.trajectory_all
# Single-pass: one trajectory_metrics run with all 7 sub-metrics (same R, one sampler pass).
# metric_display_names maps each sub-metric to the log/summary key (trajectory_*).

defaults:
  - .@pre_compute.mia_min_k: mia_min_k
  - ../../data/datasets@datasets: TOFU_MIA
  - ../../collator@collators: DataCollatorForSupervisedDatasetwithIndex

# Reference logs: retain-model eval results for privleak and forget_quality (ks_test).
# Only these two keys are required; the loader also injects retain_mia_by_step and
# retain_forget_tr_by_step from the file when present (for step-matched comparison).
# See evals.metrics.base UnlearningMetric.prepare_kwargs_evaluate_metric.
reference_logs:
  retain_model_logs:
    path: ${eval.tofu_trajectory.retain_logs_path}
    include:
      mia_min_k:
        access_key: retain
      forget_truth_ratio:
        access_key: retain_ftr

pre_compute:
  mia_min_k:
    access_key: forget

handler: trajectory_metrics
batch_size: 4
sort_by_length: true
# Order must match metric_display_names below.
metrics:
  probability: {}
  rouge:
    rouge_type: rougeL_recall
  extraction_strength: {}
  truth_ratio:
    aggregator: closer_to_1_better
    pre_compute:
      correct:
        handler: probability
        access_key: correct
        labels_field: labels_correct
      wrong:
        handler: probability
        access_key: wrong
        labels_field: labels_wrong
  ks_test:
    pre_compute:
      forget_truth_ratio:
        access_key: forget
        handler: truth_ratio
        aggregator: closer_to_1_better
        pre_compute:
          correct:
            handler: probability
            access_key: correct
            labels_field: labels_correct
          wrong:
            handler: probability
            access_key: wrong
            labels_field: labels_wrong
  hm_aggregate: {}
  privleak:
    ref_value: 0.5
    pre_compute:
      mia_min_k:
        access_key: forget
        k: 0.4  # same as standalone mia_min_k.yaml; top-level default does not merge into this nested block

# Set via CLI (e.g. dllm eval --metrics forget_Q_A_Prob forget_Q_A_ROUGE) to run a subset; null = all.
include_metrics: null

metric_display_names:
  - trajectory_forget_Q_A_Prob
  - trajectory_forget_Q_A_ROUGE
  - trajectory_extraction_strength
  - trajectory_forget_Truth_Ratio
  - trajectory_forget_quality
  - trajectory_model_utility
  - trajectory_privleak

# max_new_tokens: 200 — matches upstream TOFU generation default.
# Upstream:
#   - https://github.com/locuslab/open-unlearning/blob/main/configs/generation/default.yaml
# Sub-metric configs (non-trajectory) for parity reference:
#   - https://github.com/locuslab/open-unlearning/blob/main/configs/eval/tofu_metrics/forget_Q_A_Prob.yaml
#   - https://github.com/locuslab/open-unlearning/blob/main/configs/eval/tofu_metrics/forget_Q_A_ROUGE.yaml
#   - https://github.com/locuslab/open-unlearning/blob/main/configs/eval/tofu_metrics/extraction_strength.yaml
#   - https://github.com/locuslab/open-unlearning/blob/main/configs/eval/tofu_metrics/forget_Truth_Ratio.yaml
#   - https://github.com/locuslab/open-unlearning/blob/main/configs/eval/tofu_metrics/forget_quality.yaml
#   - https://github.com/locuslab/open-unlearning/blob/main/configs/eval/tofu_metrics/model_utility.yaml
#   - https://github.com/locuslab/open-unlearning/blob/main/configs/eval/tofu_metrics/privleak.yaml
trajectory_config:
  # Sampler evaluation mode: unguided (no target), guided_native (same F, token=target), guided_skew (F by p(a_ell), token=target).
  evaluation_mode: unguided
  logits_source: sampler
  return_logits: true
  return_fixation_steps: true
  # full = all positions 0..L (leakage); eos = positions 0..L_eff-1 only (real response). Default both.
  include_views: [full, eos]
  # Generalized metrics (dLLM-compatible): step-wise scores at fixation; matches invariants. causal = Dream/AR.
  use_generalized_sequence_probability: true
  logit_alignment: causal
  # CPU worker pool for ROUGE (default 4). Set to 0 for synchronous (no pool).
  metric_worker_pool_size: 4
  sampler_kwargs:
    steps: 50  # ceil(200/4)
    temperature: 0.0
    max_new_tokens: 200
    # Tokens between trajectory captures; larger = fewer logits stored, less memory.
    trajectory_sample_interval: 8

# Forget set uses dual-answer dataset so truth_ratio (and forget_quality) get labels_correct/labels_wrong in the batch.
datasets:
  TOFU_QA_forget:
    access_key: forget
    handler: QAwithDualAnswersDataset
    args:
      hf_args:
        name: ${eval.tofu_trajectory.forget_split}_perturbed
        split: train
        path: locuslab/TOFU
      question_key: ${eval.tofu_trajectory.question_key}
      correct_answer_key: paraphrased_answer
      wrong_answer_key: perturbed_answer
      max_length: 512
      predict_with_generate: true
  TOFU_QA_holdout:
    access_key: holdout
    handler: QADataset
    args:
      hf_args:
        name: ${eval.tofu_trajectory.holdout_split}
        split: train
        path: locuslab/TOFU
      question_key: ${eval.tofu_trajectory.question_key}
      answer_key: answer
      max_length: 512
  # Retain set: used to compute trajectory_model_utility (hm_aggregate) per step from current model, not reference_logs.
  # Dual-answer so Truth Ratio uses correct vs wrong (paraphrased vs perturbed); required for full 9-metric MU.
  TOFU_QA_retain_eval:
    access_key: retain
    handler: QAwithDualAnswersDataset
    args:
      hf_args:
        name: retain_perturbed
        split: train
        path: locuslab/TOFU
      question_key: ${eval.tofu_trajectory.question_key}
      correct_answer_key: paraphrased_answer
      wrong_answer_key: perturbed_answer
      max_length: 512
      predict_with_generate: true
  # Real authors and world facts for full 9-metric trajectory MU (ra/wf × Prob, ROUGE, Truth Ratio).
  TOFU_QA_ra_eval:
    access_key: ra
    handler: QAwithDualAnswersDataset
    args:
      hf_args:
        name: real_authors_perturbed
        split: train
        path: locuslab/TOFU
      question_key: ${eval.tofu_trajectory.question_key}
      correct_answer_key: answer
      wrong_answer_key: perturbed_answer
      max_length: 512
  TOFU_QA_wf_eval:
    access_key: wf
    handler: QAwithDualAnswersDataset
    args:
      hf_args:
        name: world_facts_perturbed
        split: train
        path: locuslab/TOFU
      question_key: ${eval.tofu_trajectory.question_key}
      correct_answer_key: answer
      wrong_answer_key: perturbed_answer
      max_length: 512

collators:
  DataCollatorForSupervisedDataset:
    args:
      padding_side: left

generation_args:
  max_new_tokens: 200
