# @package eval.tofu_trajectory.metrics.trajectory_pass_retain_sft_unguided
# Single inference pass: SFT-parity retain ROUGE (unguided).
#
# Unlike ``trajectory_pass_retain_unguided`` (pass_id ``retain__unguided``), which uses
# ``retain_perturbed`` + dual answers + ``paraphrased_answer`` for canvas trajectory ROUGE,
# this pass uses ``QADataset`` on ``locuslab/TOFU`` subset ``${eval.tofu_trajectory.retain_sft_split}``
# (``retain90`` / ``retain95`` / ``retain99``) with ``answer`` as gold — aligned with dllm SFT
# six-split retain validation. Result key: ``trajectory_retain_sft_Q_A_ROUGE``.
#
# Perturbed retain remains ``retain__unguided`` → ``trajectory_retain_Q_A_ROUGE``; merged JSON
# may contain both keys.
defaults:
  - ../../collator@collators: DataCollatorForSupervisedDatasetwithIndex

handler: trajectory_metrics
batch_size: 4
sort_by_length: true
trajectory_pass_id: retain_sft__unguided
metrics:
  rouge:
    rouge_type: rougeL_recall
trajectory_config:
  evaluation_mode: unguided
  logits_source: sampler
  return_logits: true
  return_fixation_steps: true
  rouge_prediction_source: canvas_plus_step_x0
  include_views: [full, eos]
  use_generalized_sequence_probability: true
  logit_alignment: causal
  metric_worker_pool_size: 8
  sampler_kwargs:
    steps: 50
    temperature: 0.0
    max_new_tokens: 200
    trajectory_sample_interval: 8
metric_display_names:
  - trajectory_retain_sft_Q_A_ROUGE
datasets:
  TOFU_QA_retain_sft:
    access_key: retain
    handler: QADataset
    args:
      hf_args:
        name: ${eval.tofu_trajectory.retain_sft_split}
        split: train
        path: locuslab/TOFU
      question_key: ${eval.tofu_trajectory.question_key}
      answer_key: answer
      max_length: 512
      predict_with_generate: true
collators:
  DataCollatorForSupervisedDataset:
    args:
      padding_side: left
generation_args:
  max_new_tokens: 200
