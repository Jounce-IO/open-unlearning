# @package eval.tofu_trajectory.metrics.trajectory_pass_wf_unguided
# Single inference pass: world_facts split, guidance-free (ROUGE leg). OU: wf_Q_A_ROUGE.
defaults:
  - ../../data/datasets@datasets: TOFU_QA_wf
  - ../../collator@collators: DataCollatorForSupervisedDatasetwithIndex

handler: trajectory_metrics
batch_size: 4
sort_by_length: true
trajectory_pass_id: wf__unguided
metrics:
  rouge:
    rouge_type: rougeL_recall
trajectory_config:
  evaluation_mode: unguided
  logits_source: sampler
  return_logits: true
  return_fixation_steps: true
  rouge_prediction_source: canvas_plus_step_x0
  include_views: [full, eos]
  use_generalized_sequence_probability: true
  logit_alignment: causal
  metric_worker_pool_size: 8
  sampler_kwargs:
    steps: 50
    temperature: 0.0
    max_new_tokens: 200
    trajectory_sample_interval: 8
metric_display_names:
  - trajectory_wf_Q_A_ROUGE
datasets:
  TOFU_QA_wf_eval:
    access_key: wf
    handler: QADataset
    args:
      hf_args:
        name: world_facts_perturbed
        split: train
        path: locuslab/TOFU
      question_key: ${eval.tofu_trajectory.question_key}
      answer_key: answer
      max_length: 512
      predict_with_generate: true
collators:
  DataCollatorForSupervisedDataset:
    args:
      padding_side: left
generation_args:
  max_new_tokens: 200
