# @package eval.tofu_trajectory.metrics.trajectory_forget_Q_A_ROUGE
# Trajectory-wrapped forget_Q_A_ROUGE — computed at each diffusion step.
# HF subset: non-perturbed ``${eval.tofu_trajectory.forget_split}`` + ``answer_key=answer`` (dllm SFT-parity alignment).
#
# max_new_tokens: 200 — aligned with upstream (default generation + forget ROUGE).
# Upstream references:
#   - https://github.com/locuslab/open-unlearning/blob/main/configs/generation/default.yaml
#   - https://github.com/locuslab/open-unlearning/blob/main/configs/eval/tofu_metrics/forget_Q_A_ROUGE.yaml

defaults:
  - ../../data/datasets@datasets: TOFU_QA_forget
  - ../../collator@collators: DataCollatorForSupervisedDatasetwithIndex

handler: trajectory_metrics
batch_size: 1
metrics:
  - rouge
rouge_type: rougeL_recall
trajectory_config:
  logits_source: sampler
  return_logits: true
  return_fixation_steps: true
  sampler_kwargs:
    steps: 16
    temperature: 0.0
    max_new_tokens: 200

datasets:
  TOFU_QA_forget:
    args:
      hf_args:
        name: ${eval.tofu_trajectory.forget_split}
        split: train
        path: locuslab/TOFU
      question_key: ${eval.tofu_trajectory.question_key}
      answer_key: answer
      max_length: 512
      predict_with_generate: true

collators:
  DataCollatorForSupervisedDataset:
    args:
      padding_side: left
generation_args:
  max_new_tokens: 200
