# @package eval.muse_trajectory
# MUSE trajectory: two coalesced passes (upstream token budgets).
# - trajectory_muse_knowmem: forget/retain knowmem ROUGE @ max_new_tokens=32
# - trajectory_muse_verbmem: verbmem ROUGE, extraction_strength, privleak @ 128
# Upstream refs: https://github.com/locuslab/open-unlearning/tree/main/configs/eval/muse_metrics

defaults:
  - muse_metrics:
    - trajectory_muse_knowmem
    - trajectory_muse_verbmem

handler: MUSEEvaluator
output_dir: ${paths.output_dir}
metrics: {}  # Populated by defaults (muse_metrics with @package eval.muse_trajectory.metrics.*)
samples: null  # Limit dataset size; set via CLI (eval.muse_trajectory.samples=N)
overwrite: false
data_split: News
retain_logs_path: null
retain_reference_mode: false
# False: same sampler pass as capture on, but metrics run only at the final step (009 MUSE unified path).
trajectory_capture: true
use_generalized_sequence_probability: true
logit_alignment: causal
