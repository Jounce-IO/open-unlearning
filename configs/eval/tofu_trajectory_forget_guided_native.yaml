# @package eval.tofu_trajectory
# DEPRECATED preset (010): use eval=tofu_trajectory +
# eval/tofu_metrics@eval.tofu_trajectory.tofu_metrics=trajectory_pass_forget_guided_native
# and dllm --trajectory-pass forget__guided_native (or forget__guided_skew + trajectory_pass_id).
# Kept for manual Hydra / migration only.
defaults:
  - tofu_metrics: trajectory_pass_forget_guided_native

handler: TOFUEvaluator
output_dir: ${paths.output_dir}
metrics: {}
samples: null
overwrite: false
forget_split: forget10
holdout_split: holdout10
retain_logs_path: null
retain_reference_mode: false
question_key: "question"
batch_size: 32
use_generalized_sequence_probability: true
logit_alignment: causal
trajectory_pass_id: null
trajectory_capture: true
