# @package eval.muse_trajectory.metrics.trajectory_muse_verbmem
# Verbmem + extraction + privleak trajectory pass: max_new_tokens **128** (upstream verbmem / default MUSE generation budget).
# Pairs with `trajectory_muse_knowmem` (32) for full MUSE trajectory eval.
#
# Upstream (locuslab/open-unlearning):
#   - https://github.com/locuslab/open-unlearning/blob/main/configs/generation/default.yaml
#   - https://github.com/locuslab/open-unlearning/blob/main/configs/eval/muse_metrics/forget_verbmem_ROUGE.yaml
#   - https://github.com/locuslab/open-unlearning/blob/main/configs/eval/muse_metrics/extraction_strength.yaml
#   - https://github.com/locuslab/open-unlearning/blob/main/configs/eval/muse_metrics/privleak.yaml

defaults:
  - .@pre_compute.mia_min_k: mia_min_k
  - ../../collator@collators: DataCollatorForSupervisedDatasetwithIndex

reference_logs:
  retain_model_logs:
    path: ${eval.muse_trajectory.retain_logs_path}
    include:
      mia_min_k:
        access_key: retain

pre_compute:
  mia_min_k:
    access_key: forget

handler: trajectory_metrics
batch_size: 4
sort_by_length: true
include_metrics: null

metrics:
  forget_verbmem_rouge:
    handler: rouge
    dataset_key: forget_verbmem
    rouge_type: rougeL_f1
  extraction_strength:
    dataset_key: forget_verbmem
  privleak:
    ref_value: 0.5
    pre_compute:
      mia_min_k:
        access_key: forget
        k: 0.4

metric_display_names:
  - trajectory_forget_verbmem_ROUGE
  - trajectory_extraction_strength
  - trajectory_privleak

trajectory_config:
  logits_source: sampler
  return_logits: true
  return_fixation_steps: true
  use_generalized_sequence_probability: true
  include_views: [full, eos]
  metric_worker_pool_size: 4
  sampler_kwargs:
    steps: 32 # ceil(128/4)
    temperature: 0.0
    max_new_tokens: 128
    trajectory_sample_interval: 8

datasets:
  forget_verbmem:
    access_key: forget_verbmem
    handler: CompletionDataset
    args:
      hf_args:
        path: muse-bench/MUSE-${eval.muse_trajectory.data_split}
        name: verbmem
        split: "forget[:5]"
      prefix_key: "prompt"
      text_key: "gt"
      max_length: 2048
      insert_space: true
      predict_with_generate: true
  forget:
    access_key: forget
    handler: CompletionDataset
    args:
      hf_args:
        path: muse-bench/MUSE-${eval.muse_trajectory.data_split}
        name: privleak
        split: forget
      prefix_key: prompt
      text_key: text
      max_length: 2048
  holdout:
    access_key: holdout
    handler: CompletionDataset
    args:
      hf_args:
        path: muse-bench/MUSE-${eval.muse_trajectory.data_split}
        name: privleak
        split: holdout
      prefix_key: prompt
      text_key: text
      max_length: 2048

collators:
  DataCollatorForSupervisedDataset:
    args:
      padding_side: left

generation_args:
  max_new_tokens: 128
  stopwords: ["\n\n", "\nQuestion", "Question:"]
