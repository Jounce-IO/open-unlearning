# @package _global_
# Unlearning with diffusion dLLM (LLaDA or Dream). Use with model override for LLaDA or Dream.
# Example: experiment=unlearn/tofu/diffusion model=LLaDA-8B-Instruct
#          experiment=unlearn/tofu/diffusion model=Dream-Instruct-7B

defaults:
  - override /model: LLaDA-8B-Instruct
  - override /trainer: GradAscent
  - override /data: unlearn
  - override /data/datasets@data.forget: TOFU_QA_forget
  - override /data/datasets@data.retain: TOFU_QA_retain
  - override /eval: tofu

model:
  model_args:
    pretrained_model_name_or_path: "GSAI-ML/LLaDA-8B-Instruct"
  diffusion_adapter:
    training: true
    time_epsilon: 0.001
    loss_weight_type: "scheduler"
    loss_normalization_type: "sequence"

forget_split: forget10
retain_split: retain90
holdout_split: holdout10
# TOFU six-way **multi-eval** (MDLM Phase 1/2): defaults match dllm SFT reference
# (forget10 / retain90 / holdout10, per_device_eval_batch_size 32). Training still uses
# ``forget_split`` / ``retain_split`` / ``holdout_split`` (e.g. forget01 + retain99 from CLI).
# Override via Hydra or ``dllm unlearn`` YAML ``eval.tofu.multi_eval_*_split`` (see dllm docs).
tofu_multi_eval_forget_split: forget10
tofu_multi_eval_retain_split: retain90
tofu_multi_eval_holdout_split: holdout10
retain_logs_path: null
question_key: "question"

eval:
  tofu:
    forget_split: ${forget_split}
    holdout_split: ${holdout_split}
    retain_logs_path: ${retain_logs_path}
    overwrite: true
    question_key: ${question_key}
    # Standalone TOFU metrics evaluators; align with configs/eval/tofu.yaml (SFT uses 32).
    batch_size: 32

data:
  validation_cap: 256
  anchor: forget
  forget:
    TOFU_QA_forget:
      args:
        hf_args:
          path: "locuslab/TOFU"
          name: ${forget_split}
          split: "train"
  retain:
    TOFU_QA_retain:
      args:
        hf_args:
          path: "locuslab/TOFU"
          name: ${retain_split}
          split: "train"
  # TOFU multi-eval validation: forget, retain, holdout, real_authors, world_facts, utility (method + CE per set).
  validation_splits:
    forget:
      TOFU_QA_forget:
        handler: QADataset
        args:
          hf_args:
            path: "locuslab/TOFU"
            name: ${tofu_multi_eval_forget_split}
            split: "train"
          question_key: ${question_key}
          # Same 95/5 row set as ``dllm.data.load_dataset_tofu`` (SFT multi-eval).
          match_dllm_sft_eval_rows: true
    retain:
      TOFU_QA_retain:
        handler: QADataset
        args:
          hf_args:
            path: "locuslab/TOFU"
            name: ${tofu_multi_eval_retain_split}
            split: "train"
          question_key: ${question_key}
          match_dllm_sft_eval_rows: true
    holdout:
      TOFU_QA_holdout:
        handler: QADataset
        args:
          hf_args:
            path: "locuslab/TOFU"
            name: ${tofu_multi_eval_holdout_split}
            split: "train"
          question_key: ${question_key}
          match_dllm_sft_eval_rows: true
    real_authors:
      TOFU_QA_real_authors:
        handler: QADataset
        args:
          hf_args:
            path: "locuslab/TOFU"
            name: "real_authors_perturbed"
            split: "train"
          question_key: ${question_key}
          match_dllm_sft_eval_rows: true
    world_facts:
      TOFU_QA_world_facts:
        handler: QADataset
        args:
          hf_args:
            path: "locuslab/TOFU"
            name: "world_facts_perturbed"
            split: "train"
          question_key: ${question_key}
          match_dllm_sft_eval_rows: true
    utility:
      MMLU_utility:
        handler: MMLUUtilityDataset
        args:
          hf_args:
            path: cais/mmlu
            name: abstract_algebra
            split: test
          question_key: question
          answer_key: answer
          max_length: 512
          # Match dllm SFT multi-eval utility (``verbalized_reference:true`` in ``dllm.tools.sft``).
          verbalized_reference: true

trainer:
  args:
    # HF Trainer eval dataloader (Phase 1 per-split loss); match dllm SFT ``per_device_eval_batch_size``.
    per_device_eval_batch_size: 32
    # Use warmup_ratio from trainer/finetune.yaml (same as dllm sft); epoch warmup would
    # override via open-unlearning load_trainer_args and diverge from SFT schedules.
    warmup_epochs: 0
    learning_rate: 1e-5
    weight_decay: 0.01
    num_train_epochs: 100
    max_steps: 500
    save_strategy: "steps"
    save_steps: 100
    save_total_limit: 3
    eval_strategy: "steps"
    eval_steps: 50
    do_eval: true

task_name: ???
