# @package _global_
# Unlearning with diffusion dLLM (LLaDA or Dream). Use with model override for LLaDA or Dream.
# Example: experiment=unlearn/tofu/diffusion model=LLaDA-8B-Instruct
#          experiment=unlearn/tofu/diffusion model=Dream-Instruct-7B

defaults:
  - override /model: LLaDA-8B-Instruct
  - override /trainer: GradAscent
  - override /data: unlearn
  - override /data/datasets@data.forget: TOFU_QA_forget
  - override /data/datasets@data.retain: TOFU_QA_retain
  - override /eval: tofu

model:
  model_args:
    pretrained_model_name_or_path: "GSAI-ML/LLaDA-8B-Instruct"
  diffusion_adapter:
    training: true
    time_epsilon: 0.001
    loss_weight_type: "scheduler"
    loss_normalization_type: "sequence"

forget_split: forget10
retain_split: retain90
holdout_split: holdout10
retain_logs_path: null
question_key: "question"

eval:
  tofu:
    forget_split: ${forget_split}
    holdout_split: ${holdout_split}
    retain_logs_path: ${retain_logs_path}
    overwrite: true
    question_key: ${question_key}
    # Small batch size for eval to avoid OOM with 8B diffusion model on 40GB GPU
    batch_size: 1

data:
  anchor: forget
  forget:
    TOFU_QA_forget:
      args:
        hf_args:
          path: "locuslab/TOFU"
          name: ${forget_split}
          split: "train"
  retain:
    TOFU_QA_retain:
      args:
        hf_args:
          path: "locuslab/TOFU"
          name: ${retain_split}
          split: "train"
  # Four-way validation: forget, retain, holdout, utility (method loss + CE loss per set). No full TOFU evaluators unless retain_logs_path set.
  validation_splits:
    forget:
      TOFU_QA_forget:
        handler: QADataset
        args:
          hf_args:
            path: "locuslab/TOFU"
            name: ${forget_split}
            split: "train"
          question_key: ${question_key}
    retain:
      TOFU_QA_retain:
        handler: QADataset
        args:
          hf_args:
            path: "locuslab/TOFU"
            name: ${retain_split}
            split: "train"
          question_key: ${question_key}
    holdout:
      TOFU_QA_holdout:
        handler: QADataset
        args:
          hf_args:
            path: "locuslab/TOFU"
            name: ${holdout_split}
            split: "train"
          question_key: ${question_key}
    utility:
      MMLU_utility:
        handler: MMLUUtilityDataset
        args:
          hf_args:
            path: cais/mmlu
            name: abstract_algebra
            split: test
          question_key: question
          answer_key: answer
          max_length: 512

trainer:
  args:
    warmup_epochs: 1.0
    learning_rate: 1e-5
    weight_decay: 0.01
    num_train_epochs: 100
    max_steps: 500
    save_strategy: "steps"
    save_steps: 100
    save_total_limit: 3
    eval_strategy: "steps"
    eval_steps: 50
    do_eval: true

task_name: ???
