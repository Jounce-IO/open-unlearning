# @package _global_
# TOFU trajectory eval with prompt_prefix guardrail only (no ICUL, no output filter).
# Used when task_name=guardrails-tofu-prefix so the prompt is in config, not CLI override.

defaults:
  - eval/tofu/default

eval:
  tofu_trajectory:
    metrics:
      trajectory_all:
        trajectory_config:
          guardrail:
            benchmark: tofu
            prompt_prefix: "Do not reveal the forgotten answer."
